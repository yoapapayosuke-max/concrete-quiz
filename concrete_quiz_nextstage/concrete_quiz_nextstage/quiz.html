<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>問題演習 | コンクリート技士 試験対策ゲーム</title>
  <link rel="stylesheet" href="style.css" />
  <meta name="theme-color" content="#2f6fb2" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
</head>
<body data-page="quiz">
  <div class="app-shell">
    <header class="page-header compact-header">
      <div class="header-inner">
        <p class="eyebrow">問題演習</p>
        <h1>コンクリート技士 試験対策ゲーム</h1>
      </div>
    </header>

    <main class="page-main">
      <section class="card quiz-status-card">
        <div class="quiz-topbar">
          <div class="status-group">
            <span class="badge" id="progressBadge">第 - 問 / - 問中</span>
            <span class="badge" id="scoreBadge">正解数: 0</span>
          </div>
          <div class="status-group">
            <span class="badge badge-muted" id="yearBadge">年度: -</span>
            <span class="badge badge-muted" id="categoryBadge">分野: -</span>
            <span class="badge badge-muted" id="modeBadge">モード: -</span>
            <span class="badge badge-muted" id="accuracyBadge">現在正答率: -</span>
          </div>
        </div>

        <div class="progressbar" aria-hidden="true">
          <div id="progressBarFill" class="progressbar-fill"></div>
        </div>
      </section>

      <section id="quizArea" class="card">
        <div class="meta-row">
          <div class="meta-tags" id="questionTags"></div>
        </div>

        <h2 class="question-number" id="questionNumber">問題 1</h2>
        <div class="question-stem" id="questionStem">問題文を読み込み中です。</div>

        <div id="optionsContainer" class="options-list" role="group" aria-label="選択肢一覧"></div>

        <div id="feedbackArea" class="feedback-area is-hidden" aria-live="polite">
          <div id="feedbackResult" class="feedback-result"></div>
          <div class="explanation-box">
            <h3>解説</h3>
            <p id="explanationText"></p>
          </div>
        </div>

        <div class="action-row action-row-spread">
          <button id="backToTitleButton" class="button button-secondary" type="button">タイトルへ戻る</button>
          <button id="nextButton" class="button button-primary is-hidden" type="button">次の問題へ</button>
        </div>
      </section>

      <section id="quizFallback" class="card is-hidden">
        <h2 class="section-title">問題を開始できませんでした</h2>
        <p class="text-block">
          出題条件が保存されていないか、出題対象の問題がありません。
        </p>
        <div class="action-row">
          <a href="index.html" class="button button-primary">タイトルへ戻る</a>
        </div>
      </section>
    </main>
  </div>

  <script src="questions.js"></script>
  <script src="app.js"></script>
  <script>if ("serviceWorker" in navigator) { window.addEventListener("load", () => navigator.serviceWorker.register("./service-worker.js").catch(() => {})); }</script>
</body>
</html>
