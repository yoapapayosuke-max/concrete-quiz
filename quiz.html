<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>問題 | コンクリート技士試験対策</title>
  <link rel="stylesheet" href="style.css?v=20260421-5" />
</head>
<body>
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('theme') || 'light';
        if (theme === 'dark') {
          document.body.classList.add('theme-dark');
        }
      } catch (e) {}
    })();
  </script>

  <main class="page-container quiz-shell">
    <section id="quizArea" class="quiz-card">
      <header class="quiz-header">
        <div class="quiz-header-top">
          <span id="modeBadge" class="badge">通常</span>
          <span id="accuracyBadge" class="badge">正答率 --</span>
        </div>

        <div class="title-row">
          <h1 class="quiz-title">コンクリート技士試験対策</h1>
          <a id="backToTitleLink" href="index.html" class="secondary-button link-button back-link-button">タイトルに戻る</a>
        </div>

        <div class="progress-wrap">
          <div class="progress-meta">
            <span id="progressText" class="progress-text">1 / 10</span>
            <span id="categoryBadge" class="tag-chip">分野: --</span>
          </div>
          <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
          </div>
        </div>
      </header>

      <section class="question-box">
        <div id="questionNumber" class="question-number">第1問</div>
        <div id="questionText" class="question-stem">ここに問題文が表示されます。</div>
      </section>

      <section id="optionsArea" class="option-list"></section>

      <section id="feedbackArea" class="feedback-area hidden">
        <div id="answerStatus" class="answer-status"></div>
        <div id="explanationBox" class="explanation-box"></div>
      </section>

      <div class="button-row quiz-button-row">
        <button type="button" id="nextButton" class="primary-button hidden">次へ</button>
      </div>
    </section>
  </main>

  <script src="questions.js?v=20260421-5"></script>
  <script src="mock-exam.js?v=20260421-5"></script>
  <script src="app.js?v=20260421-5"></script>
</body>
</html>
