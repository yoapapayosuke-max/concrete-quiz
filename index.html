<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>コンクリート技士試験対策</title>
  <link rel="stylesheet" href="style.css?v=20260421-5" />
  <meta name="theme-color" content="#2f6fb2" />
</head>
<body>
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('theme') || 'light';
        if (theme === 'dark') {
          document.body.classList.add('theme-dark');
        }
      } catch (e) {}
    })();
  </script>

  <main class="page-container app-shell">
    <section class="hero-card title-card">
      <div class="hero-head">
        <span class="badge">社内教育 / 自主学習対応</span>
        <h1 class="page-title">コンクリート技士試験対策</h1>
        <p class="hero-text">
          分野別学習と模擬試験の両方に対応したベータ版です。
        </p>
      </div>

      <div class="button-row top-utility-row">
        <button type="button" id="installAppButton" class="secondary-button">画面にホームに追加</button>
      </div>

      <form id="startForm" class="settings-card form-stack" novalidate>
        <h2 class="section-title">学習モード</h2>

        <div class="form-grid">
          <div class="form-group">
            <label for="modeSelect">出題モード</label>
            <select id="modeSelect" name="mode">
              <option value="normal">通常</option>
              <option value="random">ランダム</option>
              <option value="wrongOnly">間違えた問題の復習</option>
              <option value="weakCategory">正答率の低い分野の復習</option>
            </select>
          </div>

          <div class="form-group">
            <label for="questionCount">問題数</label>
            <select id="questionCount" name="count">
              <option value="10">10問</option>
              <option value="20">20問</option>
              <option value="30">30問</option>
              <option value="50">50問</option>
            </select>
          </div>

          <div class="form-group">
            <label for="categorySelect">分野</label>
            <select id="categorySelect" name="category">
              <option value="all">すべて</option>
              <option value="a">a 材料</option>
              <option value="b">b 配合</option>
              <option value="c">c フレッシュコンクリートの性質</option>
              <option value="d">d 硬化コンクリート</option>
              <option value="e">e 製造・品質管理</option>
              <option value="f">f 施工</option>
              <option value="g">g 特殊コンクリート</option>
              <option value="h">h 構造・力学・法令・その他</option>
            </select>
          </div>

          <div class="form-group">
            <label for="themeSelect">表示テーマ</label>
            <select id="themeSelect" name="theme">
              <option value="light">ライト</option>
              <option value="dark">ダーク</option>
            </select>
          </div>
        </div>

        <div class="info-row">
          <span class="tag-chip">スマホ対応</span>
          <span class="tag-chip">GitHub Pages対応</span>
          <span class="tag-chip">ダークモード対応</span>
        </div>

        <section class="summary-card cumulative-card">
          <h2 class="section-title">これまでの成績</h2>
          <div class="summary-grid compact-summary-grid">
            <article class="stat-box">
              <div class="stat-label">累計解答数</div>
              <div id="totalAnsweredValue" class="stat-value stat-value-small">0</div>
            </article>
            <article class="stat-box">
              <div class="stat-label">累計正答率</div>
              <div id="overallAccuracyValue" class="stat-value stat-value-small">0%</div>
            </article>
            <article class="stat-box">
              <div class="stat-label">間違えた問題</div>
              <div id="wrongCountValue" class="stat-value stat-value-small">0</div>
            </article>
            <article class="stat-box">
              <div class="stat-label">苦手分野</div>
              <div id="weakCategoryValue" class="stat-value stat-value-small">--</div>
            </article>
          </div>
        </section>

        <div class="button-row">
          <button type="submit" class="primary-button">スタート</button>
          <button type="button" id="resetStatsButton" class="secondary-button">成績をリセット</button>
        </div>
      </form>

      <section class="settings-card form-stack mock-section">
        <h2 class="section-title">模擬試験</h2>
        <p class="hero-text">
          本試験対策用の40問固定です。開始後は問題画面からタイトルに戻れません。
        </p>

        <div class="form-grid">
          <div class="form-group">
            <label for="mockPatternSelect">出題パターン</label>
            <select id="mockPatternSelect">
              <option value="pattern1">パターン1</option>
              <option value="pattern2">パターン2</option>
            </select>
          </div>

          <div class="form-group">
            <label for="mockYearDisplay">年度設定</label>
            <input id="mockYearDisplay" type="text" value="2025" readonly />
          </div>
        </div>

        <div class="button-row">
          <button type="button" id="mockStartButton" class="primary-button">模擬試験を開始</button>
        </div>
      </section>
    </section>
  </main>

  <script src="questions.js?v=20260421-5"></script>
  <script src="mock-exam.js?v=20260421-5"></script>
  <script src="app.js?v=20260421-5"></script>
</body>
</html>
