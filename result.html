<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>結果 | コンクリート技士試験対策</title>
  <link rel="stylesheet" href="style.css?v=20260421-5" />
</head>
<body>
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('theme') || 'light';
        if (theme === 'dark') {
          document.body.classList.add('theme-dark');
        }
      } catch (e) {}
    })();
  </script>

  <main class="page-container result-shell">
    <section id="resultArea" class="result-card">
      <header class="result-header">
        <div class="title-row">
          <div>
            <span class="badge">結果</span>
            <h1 class="result-title">コンクリート技士試験対策</h1>
            <p id="resultLead" class="result-lead">今回の成績と復習ポイントを確認できます。</p>
          </div>
          <a class="secondary-button link-button back-link-button no-print" href="index.html">タイトルに戻る</a>
        </div>
      </header>

      <section class="summary-grid">
        <article class="summary-card stat-box">
          <div class="stat-label">得点</div>
          <div id="scoreValue" class="stat-value">0 / 0</div>
        </article>

        <article class="summary-card stat-box">
          <div class="stat-label">正答率</div>
          <div id="accuracyValue" class="stat-value">0%</div>
        </article>

        <article class="summary-card stat-box">
          <div class="stat-label">出題モード</div>
          <div id="modeValue" class="stat-value stat-value-small">--</div>
        </article>

        <article class="summary-card stat-box">
          <div class="stat-label">分野</div>
          <div id="categoryValue" class="stat-value stat-value-small">--</div>
        </article>
      </section>

      <section id="cumulativeStatsSection" class="summary-card cumulative-card">
        <h2 class="section-title">これまでの成績</h2>
        <div class="summary-grid compact-summary-grid">
          <article class="stat-box">
            <div class="stat-label">累計解答数</div>
            <div id="cumulativeAnsweredValue" class="stat-value stat-value-small">0</div>
          </article>

          <article class="stat-box">
            <div class="stat-label">累計正答率</div>
            <div id="cumulativeAccuracyValue" class="stat-value stat-value-small">0%</div>
          </article>

          <article class="stat-box">
            <div class="stat-label">間違えた問題</div>
            <div id="cumulativeWrongValue" class="stat-value stat-value-small">0</div>
          </article>

          <article class="stat-box">
            <div class="stat-label">苦手分野</div>
            <div id="cumulativeWeakCategoryValue" class="stat-value stat-value-small">--</div>
          </article>
        </div>
      </section>

      <section class="result-actions no-print">
        <a class="secondary-button link-button" href="index.html">タイトルへ戻る</a>
        <button type="button" id="printPdfButton" class="primary-button">PDF保存</button>
      </section>

      <section class="review-section">
        <h2 class="section-title">解答レビュー</h2>
        <div id="reviewList" class="review-list"></div>
      </section>
    </section>
  </main>

  <script src="questions.js?v=20260421-5"></script>
  <script src="mock-exam.js?v=20260421-5"></script>
  <script src="app.js?v=20260421-5"></script>
</body>
</html>
